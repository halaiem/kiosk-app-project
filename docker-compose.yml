version: "3.8"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-irida}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-irida_secret}
      POSTGRES_DB: ${POSTGRES_DB:-irida}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-irida}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend (FastAPI — все 15 функций) ──
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-irida}:${POSTGRES_PASSWORD:-irida_secret}@postgres:5432/${POSTGRES_DB:-irida}
      MAIN_DB_SCHEMA: ${MAIN_DB_SCHEMA:-public}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      YANDEX_SPEECHKIT_KEY: ${YANDEX_SPEECHKIT_KEY:-}
    ports:
      - "8000:8000"

  # ── Frontend (Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: server/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
